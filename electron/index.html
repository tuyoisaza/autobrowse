<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoBrowse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AutoBrowse</h1>
      <div>
        <button class="btn" onclick="showNewTaskModal()">+ New Task</button>
        <button class="btn btn-secondary" onclick="startRecording()">● Record</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="value" id="totalTasks">-</div>
        <div class="label">Total Tasks</div>
      </div>
      <div class="stat-card">
        <div class="value" id="completedTasks">-</div>
        <div class="label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="value" id="activeTasks">-</div>
        <div class="label">Running</div>
      </div>
      <div class="stat-card">
        <div class="value" id="recordingsCount">-</div>
        <div class="label">Recordings</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('tasks')">Tasks</div>
      <div class="tab" onclick="switchTab('recordings')">Recordings</div>
      <div class="tab" onclick="switchTab('profiles')">Profiles</div>
      <div class="tab" onclick="switchTab('settings')">Settings</div>
    </div>

    <div id="tasksSection" class="section">
      <h2>Recent Tasks</h2>
      <ul class="list" id="tasksList"><li class="loading">Loading...</li></ul>
    </div>

    <div id="recordingsSection" class="section" style="display:none">
      <h2>Recordings</h2>
      <ul class="list" id="recordingsList"><li class="loading">Loading...</li></ul>
    </div>

    <div id="profilesSection" class="section" style="display:none">
      <h2>Browser Profiles</h2>
      <ul class="list" id="profilesList"><li class="loading">Loading...</li></ul>
    </div>

    <div id="settingsSection" class="section" style="display:none">
      <h2>Settings</h2>
      <p>AI Configuration, Browser Settings, etc.</p>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tasksSection').style.display = tab === 'tasks' ? 'block' : 'none';
      document.getElementById('recordingsSection').style.display = tab === 'recordings' ? 'block' : 'none';
      document.getElementById('profilesSection').style.display = tab === 'profiles' ? 'block' : 'none';
      document.getElementById('settingsSection').style.display = tab === 'settings' ? 'block' : 'none';
    }

    async function loadData() {
      try {
        const tasksRes = await fetch('http://127.0.0.1:5847/tasks?limit=10');
        const tasks = await tasksRes.json();
        const recordingsRes = await fetch('http://127.0.0.1:5847/recordings');
        const recordings = await recordingsRes.json();
        const profilesRes = await fetch('http://127.0.0.1:5847/profiles');
        const profiles = await profilesRes.json();

        document.getElementById('totalTasks').textContent = tasks.length;
        document.getElementById('completedTasks').textContent = tasks.filter(t => t.status === 'completed').length;
        document.getElementById('activeTasks').textContent = tasks.filter(t => t.status === 'running').length;
        document.getElementById('recordingsCount').textContent = recordings.recordings?.length || 0;

        document.getElementById('tasksList').innerHTML = tasks.length ? '' : '<li class="list-item">No tasks yet</li>';
        tasks.forEach(task => addTaskToList(task));

        document.getElementById('recordingsList').innerHTML = recordings.recordings?.length ? '' : '<li class="list-item">No recordings yet</li>';
        recordings.recordings?.forEach(rec => addRecordingToList(rec));

        document.getElementById('profilesList').innerHTML = profiles.profiles?.length ? '' : '<li class="list-item">No profiles yet</li>';
        profiles.profiles?.forEach(prof => addProfileToList(prof));
      } catch (err) { console.error('Failed to load data:', err); }
    }

    function addTaskToList(task) {
      const li = document.createElement('li');
      li.className = 'list-item';
      li.innerHTML = `<div><strong>${task.instruction.substring(0, 50)}${task.instruction.length > 50 ? '...' : ''}</strong><br><small>${new Date(task.created_at).toLocaleString()}</small></div><span class="status-badge status-${task.status}">${task.status}</span>`;
      document.getElementById('tasksList').appendChild(li);
    }

    function addRecordingToList(rec) {
      const li = document.createElement('li');
      li.className = 'list-item';
      li.innerHTML = `<div><strong>${rec.name}</strong><br><small>${rec.duration}ms • ${new Date(rec.created_at).toLocaleString()}</small></div><div><button class="btn" onclick="playRecording('${rec.id}')">▶ Play</button><button class="btn btn-danger" onclick="deleteRecording('${rec.id}')">×</button></div>`;
      document.getElementById('recordingsList').appendChild(li);
    }

    function addProfileToList(prof) {
      const li = document.createElement('li');
      li.className = 'list-item';
      li.innerHTML = `<div><strong>${prof.name}</strong><br><small>${new Date(prof.created_at).toLocaleString()}</small></div><button class="btn btn-danger" onclick="deleteProfile('${prof.id}')">×</button>`;
      document.getElementById('profilesList').appendChild(li);
    }

    function startRecording() {
      const name = prompt('Recording name:');
      if (name) {
        fetch('http://127.0.0.1:5847/recordings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) }).then(() => alert('Recording started!'));
      }
    }

    function playRecording(id) {
      fetch(`http://127.0.0.1:5847/recordings/${id}/play`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ speed: 1 }) });
    }

    function deleteRecording(id) {
      if (confirm('Delete recording?')) { fetch(`http://127.0.0.1:5847/recordings/${id}`, { method: 'DELETE' }).then(loadData); }
    }

    function deleteProfile(id) {
      if (confirm('Delete profile?')) { fetch(`http://127.0.0.1:5847/profiles/${id}`, { method: 'DELETE' }).then(loadData); }
    }

    function showNewTaskModal() {
      const instruction = prompt('Enter instruction:');
      if (instruction) {
        fetch('http://127.0.0.1:5847/tasks', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ instruction }) }).then(() => loadData());
      }
    }

    loadData();
    setInterval(loadData, 5000);
  </script>
</body>
</html>

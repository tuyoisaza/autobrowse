<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoBrowse</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 700px;
      text-align: center;
    }
    h1 {
      font-size: 2.5em;
      color: #fff;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #888;
      margin-bottom: 40px;
      font-size: 1.1em;
    }
    .prompt-box {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    #instruction {
      width: 100%;
      padding: 15px 20px;
      font-size: 1.1em;
      border: 2px solid #e94560;
      border-radius: 8px;
      background: #1a1a2e;
      color: #fff;
      outline: none;
    }
    #instruction:focus {
      border-color: #ff6b8a;
      box-shadow: 0 0 20px rgba(233,69,96,0.3);
    }
    #instruction::placeholder {
      color: #666;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #ff6b8a;
      transform: translateY(-2px);
    }
    .btn:disabled {
      background: #666;
      cursor: not-allowed;
    }
    #result {
      margin-top: 30px;
      background: #0f3460;
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      display: none;
    }
    #result.show { display: block; }
    #result pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #aaa;
      font-size: 0.9em;
      max-height: 400px;
      overflow-y: auto;
    }
    .error { color: #f44336 !important; }
    .success { color: #4caf50 !important; }
    #loading {
      display: none;
      margin-top: 20px;
      color: #e94560;
    }
    #loading.show { display: block; }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 AutoBrowse</h1>
    <p class="subtitle">Type what you want me to do</p>
    
    <div class="prompt-box">
      <form id="promptForm">
        <input type="text" id="instruction" 
          placeholder="e.g., go to github.com and get the title" 
          autofocus>
        <br>
        <button type="submit" class="btn" id="submitBtn">Go →</button>
      </form>
    </div>
    
    <div id="loading">
      <span class="spinner"></span>
      <span id="loadingText">Working...</span>
    </div>
    
    <div id="result">
      <div id="resultContent"></div>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:5847';
    
    document.getElementById('promptForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const instruction = document.getElementById('instruction').value.trim();
      if (!instruction) return;
      
      const btn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const resultContent = document.getElementById('resultContent');
      
      btn.disabled = true;
      loading.classList.add('show');
      result.classList.remove('show');
      
      try {
        const res = await fetch(`${API}/prompt`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instruction })
        });
        const data = await res.json();
        
        loading.classList.remove('show');
        result.classList.add('show');
        
        if (data.success) {
          let resultText = data.result || 'Done!';
          try {
            const parsed = JSON.parse(data.result);
            resultText = JSON.stringify(parsed, null, 2);
          } catch {}
          resultContent.innerHTML = `<pre class="success">${resultText}</pre>`;
        } else {
          resultContent.innerHTML = `<pre class="error">${data.error || 'Unknown error'}</pre>`;
        }
      } catch (err) {
        loading.classList.remove('show');
        result.classList.add('show');
        resultContent.innerHTML = `<pre class="error">Connection error: ${err.message}</pre>`;
      }
      
      btn.disabled = false;
    });
  </script>
</body>
</html>
